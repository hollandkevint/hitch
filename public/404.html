<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Not in the record — Hitch Planning</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #faf7f2; color: #26302b; padding: 24px;
    font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  .slip {
    background: #fffdf9; border: 1px solid #e9e2d6; border-radius: 14px;
    padding: 34px 38px; max-width: 480px; box-shadow: 0 1px 2px rgba(58,50,38,0.04);
  }
  .stamp {
    display: inline-block; transform: rotate(-4deg); margin-bottom: 18px;
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(43,74,62,0.62); border: 3px solid rgba(43,74,62,0.55);
    border-radius: 5px; padding: 8px 12px 7px 15px; mix-blend-mode: multiply;
  }
  h1 { font-family: Georgia, "Times New Roman", serif; font-size: 1.4rem; font-weight: 600; margin-bottom: 10px; }
  p { font-size: 0.92rem; color: #706d65; line-height: 1.55; margin-bottom: 20px; }
  a { color: #2b4a3e; font-weight: 600; text-decoration: underline; text-decoration-color: #b9cdc0; text-underline-offset: 3px; }
  a + a { margin-left: 18px; }
  a:focus-visible { outline: 2px solid #2b4a3e; outline-offset: 2px; }
</style>
</head>
<body>
  <main class="slip">
    <span class="stamp">Not in the record</span>
    <h1>This page isn't in the plan.</h1>
    <p>Hitch only acts on what's actually in the record — the same rule applies to URLs. Nothing was written.</p>
    <nav><a href="/">Back to the demo</a><a href="/panel.html">Site overview</a></nav>
  </main>
</body>
</html>
